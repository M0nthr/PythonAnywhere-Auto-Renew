name: Auto-Renew PythonAnywhere

on:
  schedule:
    - cron: '0 4 1,15 * *'
  workflow_dispatch:

jobs:
  renew_and_keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        run: |
          git clone --depth=50 https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.ref_name }}
      
      - name: Setup Python
        run: |
          echo "Python version:"
          python3 --version
      
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 python-dotenv
      
      - name: Run renewal script
        env:
          PA_ACCOUNTS: ${{ secrets.PA_ACCOUNTS }}
        run: python3 renew_python_anywhere.py
      
      - name: Keep Alive Workflow (Success)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/logs
          LOG_FILE=".github/logs/workflow_runs.log"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "========================================" >> $LOG_FILE
          echo "Workflow Run: $TIMESTAMP" >> $LOG_FILE
          echo "Status: SUCCESS ✅" >> $LOG_FILE
          echo "Trigger: ${{ github.event_name }}" >> $LOG_FILE
          echo "Run ID: ${{ github.run_id }}" >> $LOG_FILE
          echo "========================================" >> $LOG_FILE
          git add $LOG_FILE
          git commit -m "log: workflow run SUCCESS on $TIMESTAMP"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin ${{ github.ref_name }}
          echo "✅ Success logged and committed"
      
      - name: Keep Alive Workflow (Failure)
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/logs
          LOG_FILE=".github/logs/workflow_runs.log"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "========================================" >> $LOG_FILE
          echo "Workflow Run: $TIMESTAMP" >> $LOG_FILE
          echo "Status: FAILED ❌" >> $LOG_FILE
          echo "Note: Check GitHub Actions logs for error details" >> $LOG_FILE
          echo "========================================" >> $LOG_FILE
          git add $LOG_FILE
          git commit -m "log: workflow run FAILED on $TIMESTAMP"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin ${{ github.ref_name }}
          echo "❌ Failure logged and committed"

      - name: Send Professional Telegram Report
        if: always()
        run: |
          # تحديد الأيقونة والحالة
          ICON="✅"
          if [ "${{ job.status }}" != "success" ]; then ICON="❌"; fi
          
          # بناء نص التقرير الاحترافي
          TEXT="<b>$ICON تقرير حالة التجديد الآلي</b>%0A"
          TEXT+="----------------------------------%0A"
          TEXT+="<b>الحالة النهائية:</b> <blockquote>${{ job.status }}</blockquote>%0A"
          TEXT+="<b>وقت التنفيذ:</b> $(date -u +'%Y-%m-%d %H:%M:%S UTC')%0A%0A"
          TEXT+="<b>ملخص السجلات:</b>%0A"
          TEXT+="<code>$(tail -n 35 .github/logs/workflow_runs.log)</code>%0A%0A"
          TEXT+="🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>رابط المتابعة الفنية 🚀</a>"
          
          # إرسال التقرير لتيليجرام
          curl -s "https://api.telegram.org/bot8260513380:AAH0oR9SehpePt2DMbzn9i9hBmAQjgCc9MI/sendMessage" \
          -d chat_id=5561387511 \
          -d parse_mode=HTML \
          -d text="$TEXT"
